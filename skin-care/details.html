   			window.comments_data={"essence/iteam1.jpg":{"grade":4.9,"pos":["保湿控油效果：一点都不油腻,舒服最重要。 吸收效果：完美吸收,调理肌肤。 我的肤质：油性皮肤","清爽不油腻,用着很舒服,至于效果慢慢来,护肤从29岁就要认真了","蛋清质感,非常轻薄很好吸收,用了几天来评价,皮肤确实有了一点改善,持续试用,期待更多惊喜,活动买的很划算！"],"neg":["不好用,差评！差评！差评！","不好用,太失望","效果不好,还那么贵,还不如几十块钱的维生素E好用呢！"],"neu":["我觉得有点油,不太好吸收,用了一周,效果不是很明显,再用用看看","我是混油偏干的皮肤,还有点敏感。这个精华比较好吸收,不油腻。用起还是很舒服的,但是说到效果的话目前没有看到什么效果。,坚持用完一瓶再看看怎么样吧。不过就是很贵,买了几次了也没什么赠品。准备下次还是到专柜买吧。","感觉贵的产品功效也是一般的,我之前买了瓶小黑瓶但快用到玩了,毛孔还是粗大,反正感觉效果不是很明显"]},"essence/iteam2.jpg":{"grade":4.8, "pos":["吸收良好,不油腻,滋润效果不错。","已经第二次购买了,用着皮肤好很多。","期待好久的红腰子鸭,果然没让我失望,现在皮肤很稳定,肤色也慢慢的变健康了,会回购哒"],"neg":["试用装过敏,再也不会买了,垃圾","用了以后就开始冒痘,断断续续的,一直没想到是红腰子的问题,后来停用了几次,每次再次使用,不到半小时就开始发红,发痒,冒痘", "用的试用装,痘痘发的很厉害,停用就没事了,找客服退货,说是要没开封的前提才能退只有,用了试用装不能退,特么搞笑,不用谁知道过不过敏,还说要要医院出具证明,查过敏源有多困难她可能不知道,好像谁拿着自己脸开玩笑一样,用了长痘痘就是长痘痘,不好用,也没有去查是不是正品,丢在家里没用了,自己经历分享大家,护肤品不要跟风购买,需要谨慎适合自己最重要"],"neu":["用了两次没什么太大的感觉,但是应该会有效果,毕竟网上炒的这么火应该也是有原因的,物流挺快的,送了好几个小样还挺划算的,用用再说,有效果的话以后会坚持用这个。","没有想象中的好,刚用的时候有点黏乎乎的感觉,只能说是真的被捧花的无功无过的产品啊。","我觉得用起来一般吧,送的那套小样觉得很黏,上脸有点闷,红腰子也觉得没有网上说的那么神奇,可能用的时间短？再用用看吧"]},"essence/iteam3.jpg":{"grade":4.9,"pos":["滋润清爽不油腻,感觉会有些提亮效果！继续使用","很喜欢焕白精华,用了一段时间,皮肤比以前亮了,之前暗沉还不均匀,可能要长期用了","使用一周,皮肤确实有改善,变白变光滑了"],"neg":["用了一段时间,质地拍到脸上粘粘的,效果还不是很明显","剛開始用,先開始用的小樣,持續用了4毫升,有些黏稠,不過很好摸開,不知道什麼時候可以明顯的效果","为了评价真实,特意用了一个月有余来评价,使用效果一般,反而感觉皮肤越显得脏了,以前是淡淡的小点斑,现在整个皮肤密密麻麻的。好愁啊！"],"neu":["目前感觉没有明显效果,一定要等时间长一点充分吸收之后才下一步,不然容易搓泥。","第二次购买,用着没有特别大的效果,商品有建议配合防晒霜使用,所以大概是防晒霜起到的作用比较大,没有以前那么黑","这个淡斑精华已经用了6瓶了,淡斑效果一般,用完这么多瓶,总体感觉就是提亮肤色,淡斑效果还真木有毕竟已经用了6瓶了"]},"essence/iteam4.jpg":{"grade":4.9,"pos":["质地手感：流动性很好 吸收效果：吸收的很快,吸收差不多后续叠稍微油的精华也不会搓泥 整体评价：整体来讲肤感很满意,不油,不闷,适合油痘肌,里面有水杨酸,能稍微调理皮肤,美白效果有待考证,30ml很小一支,感觉会很快用完","用了一段时间淡斑效果不错,肉眼可见,会继续回购","用了一段时间感觉确实还不错,有美白效果的。需要长期坚持使用！！！"],"neg":["没有任何的效果,而且正品和赠品颜色都不一样","说实话擦起来没太大效果,感觉不如欧莱雅的美白精华好用,这个价格使用效果真的一般,没有广告和小红书上说的那么神奇夸张呀。不会回购了,整体效果不好。","小红书推荐过来买的 小红书都是骗人的 用后感觉很一般 没什么效果"],"neu":["美白效果：暂时没有发现美白效果 保湿控油效果：保湿效果可以 吸收效果：吸收还行吧,效果期待中,日后追评 我的肤质：非易敏,中性偏干","听说效果不错,准备试一试,希望能淡斑提亮肤色吧","每天在坚持使用,目前还没有效果,我买来主要是淡痘印,现在还没有看到一点效果"]},"essence/iteam5.jpg":{"grade":4.8,"pos":["买了30ml又回购了50ml的,提亮和均匀肤色的效果特别好,给妈妈用的,麻麻点名以后只用这个肌光精华","美白效果：提亮肤色 整体评价：明显的淡化痘印,提亮肤色,保湿度很好,值得购买,用完继续屯起来","真心推荐,非常好用,生完孩子我的脸色一直偏黄,还有些暗,用了这个觉得肤色真的有改善,是使用了一段时间的评价。"],"neg":["说一下真实感受,附送的小棕瓶小瓶用完第一天下巴冒痘,是炎症痘类型的很疼的那种,冒了很多个,看了某书发现很多人都这样,墙烈建议买前先用小样试试","说实话,感觉一般,不知道是不是我不适合用精华,感觉会闷痘,用了有点搓泥,我是洗完脸直接上的……","整体评价：除了包装好看。肤色提亮 淡斑效果一点没看到。 不好用,鸡肋,华而不实。 美白效果：无"],"neu":["使用中,目前还没看到有肤色的变化","整体评价：目前用了一个星期,没有太大感觉 美白效果：还没看出来 保湿控油效果：还可以,不油腻 质地手感：精华液的质地 吸收效果：上脸易吸收 我的肤质：t区油脸颊中性","目前用着无功无过"]},"essence/iteam6.jpg":{"grade":4.8,"pos":["Olay精华液真的感觉脸有变白,红润了很多。精华上脸不刺激,很舒服。香味甜甜香香的我也超喜欢啊！！！精华是乳白色的,质地比较厚,肤感稍黏,吸收度中上。就当平常的保湿乳液用,挺滋润的","整体评价：很好,空瓶至少10瓶了 美白效果：至少白了3个度 保湿控油效果：可 质地手感：可 吸收效果：可 我的肤质：混皮","很快吸收 上脸也不会特别油 是正品 美白一星期能看到效果 保湿控油效果很好"],"neg":["效果真的很一般！个人混合肤质的用起没什么效果,性价比不高！跟150的精华真心差别不大,而且肤质敏感的还是别买了抹了容易脸疼。","闺蜜推荐我买的 但是我个人感觉用了搓泥 而且上脸之后脸更暗沉了 不知道到底会不会有效果 那个吸的盖子也总是吸不上来 体验感不佳","整体评价：不好用,有点油,涂了以后睡一觉起来脸红红的……已经送给别人了"],"neu":["正在使用,暂时没有什么明显的变化","挺好看的包装,然后涂上有些泛油光,之前已经用过120毫升了,感觉效果一般。现在再试试,看看能不能祛黄美白一些。","用了两年多了,本身比较便宜,效果不是很明显"]},"essence/iteam7.jpg":{"grade":4.9,"pos":["用了修丽可家的东西就不想换其他的了,超级好用,之前油脂分泌不好,经常长闭口,痘痘,用了果酸和色修,半个月就能看到效果,闭口少了,而且很容易成熟,直接用祛痘针清干净,再配合色修,就不红了,也不容易留下黑色痘印,真的是大爱。后悔没有早点认识它,这样脸上就不会有黑色痘印了。","这个夜间抗氧修复精华很好用,让敏感皮肤痘痘肌有改善比较稳定,晚上用后早上起来皮肤质感好,看着挺油上脸好吸收,一点也感油腻,已经用过好几瓶了,常备品。","这个夜间修护精华真的不是盖的,我刚生完宝宝,基本天天被动熬夜,本人很白,但熬夜之后脸色不佳,灰突突的,超级暗沉,脑门皮肤下面还起了小痘痘,是那种眼睛看不到,能摸出来的小痘痘。用了这个精华大概半个月吧,痘痘已经没有了,皮肤也恢复好多"],"neg":["肤感和味道都很奇怪…","用了居然爆痘、爆痘、爆痘！","用一次过敏一次"],"neu":["目前没有很明显的改变,希望坚持用下去会有效果","用了几天啦功效没有什么特别的感觉","不知道怎么回事,我擦这个没有什么感觉"]   },"essence/iteam8.jpg":{"grade":4.9,"pos":["温和不刺激,美白效果暂时没看出来,不过痘印淡了,不错的,性价比很高","美白效果：平价的美白精华,希望能提亮肤色淡化斑点 保湿控油效果：保湿 质地手感：清爽 吸收效果：好吸收","整体评价：非常好质地细腻 美白效果：穿透性的美白效果可见 吸收效果：涂抹在面部吸收很快 我的肤质：我自己就是混合型皮肤但是用了小晶瓶以后皮肤更加透亮有光泽！自己使用了这么久照顾真的是立竿见影,以前都是在专卖店进行购买没有想到网上的力度非常大！花了一瓶的钱买了两瓶所以说真的非常划算性价比也很不错,真的是可以媲美千元的美白产品同时不亚于千元的产品非常好"],"neg":["香味还好吧,比什么欧莱雅小黑瓶好多了,不算很浓,但是搓泥呀,不会回购","收到后才用了几天,还没感觉到很明显的变化,就不作太多评价了,之后追评再写。我是混干皮,香味挺好闻,吸收挺快的,就是刚收到的时候发现瓶盖边缘有磨了一圈的痕迹,只要盖盖子,就会在瓶盖周围留下磨痕,显得瓶身不是特别高档啊……
