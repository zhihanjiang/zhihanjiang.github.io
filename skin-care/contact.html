<!DOCTYPE HTML>
<html>
	<head>
		<title>Contact</title>
		<link href="css/bootstrap.css" rel='stylesheet' type='text/css' />
		<!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
		<script src="js/jquery.min.js"></script>
		 <!-- Custom Theme files -->
		<link href="css/style.css" rel='stylesheet' type='text/css' />
   		 <!-- Custom Theme files -->
   		<meta name="viewport" content="width=device-width, initial-scale=1">
   		<script src="js/getparam.js"></script>
		<script type="application/x-javascript"> addEventListener("load", function() { setTimeout(hideURLbar, 0); }, false); function hideURLbar(){ window.scrollTo(0,1); } 
			window.userid = $.Request("userid");
			window.groupid = $.Request("groupid");
			window.type = parseInt($.Request("type"));
			window.pageid = 1;
			about_path="about.html?&userid="+window.userid+"&groupid="+window.groupid+"&type="+window.type;
			if(window.type==0 || (window.type>0 && window.type<=8)){
				collections_path="collections_ess.html?userid="+window.userid+"&groupid="+window.groupid;
			}
			else{
				collections_path="collections_eye.html?userid="+window.userid+"&groupid="+window.groupid;
			}
			document.getElementById("about").setAttribute("href",about_path);
			document.getElementById("collections").setAttribute("href",collections_path);

		</script>
	</head>
	<body>
		<!-- sub-header -->
		<div class="sub-header">
			<div class="container">
				<!-- top-nav -->
				<div class="top-nav">
					<span class="menu"> </span>
					<ul>
						<li><a id="collections" href="#">Collections</a></li>
						<li><a id="about" href="#">About</a></li>
						<li><a id="contact" href="#">Contact</a></li>
						<div class="clearfix"> </div>
					</ul>
				</div>
				<!-- top-nav -->
				<!-- script-for-nav -->
				<script>
					$(document).ready(function(){
						$("span.menu").click(function(){
							$(".top-nav ul").slideToggle(300);
						});
					});
				</script>
				<!-- script-for-nav -->
			</div>
		</div>
		<!-- /sub-header -->
		<!-- content -->
		<!-- contact -->
		<div class="contact">
			<div class="container">
				<div class="contact-head text-center">
					<h2>Contact us</h2>
					<span>email, phone, etc.</span>
				</div>
			</div>
		</div>
</body>
</html>
