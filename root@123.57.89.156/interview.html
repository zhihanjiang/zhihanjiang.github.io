	    <script type="text/javascript">
	    	//window.upload_texts=0;
	    	window.upload_texts=0;
		    submit = function(){
		    	window.texts = document.getElementById("input_texts").value;
		    	console.log(texts);
		    	if(window.texts==""){
		    		alert("请填写反馈！");
		    	}
		    	else{
		    		window.pageOpen=new Date();
					time = pageOpen.getTime();
	 				console.log(time);
	 				const Feedback = AV.Object.extend('feedback_'+window.userid);
					const feedback = new Feedback();
					feedback.set('userid',parseInt(window.userid));
					feedback.set('time',time);
					feedback.set('productid',parseInt(window.selected_product_id));
					feedback.set('feedback',window.texts);
					// 将对象保存到云端
					feedback.save().then((feedback) => {
					  // 成功保存之后，执行其他逻辑
					  console.log(`Success, objectId: ${feedback.id}`);
					  alert("提交成功！");
					  window.upload_texts=1;
					}, (error) => {
						console.log(error);
						alert("出现错误！请重试或者联系管理员。");
					  // 异常处理
					});
		    	}
				
			}
